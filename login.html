<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IoT Smart Safe Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1020;
            color: #e8eefc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            width: 360px;
            background: #131c35;
            border: 1px solid #26365f;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        p {
            color: #9fb0d8;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #33466f;
            background: #0b1020;
            color: white;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2f80ed;
            color: white;
            font-size: 16px;
            margin-top: 12px;
            cursor: pointer;
        }

        .error {
            color: #ff4d6d;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>IoT Smart Safe</h1>
        <p>대시보드 접속을 위해 로그인하세요.</p>

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>

    </div>
</body>
</html>
